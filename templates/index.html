{%  extends 'base.html' %}
{% block title %}
Index
{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
{% endblock %}
{% block contents %}
<div class="d-flex justify-content-between align-items-center flex-wrap mb-4 my-4">
    <h3><i class="bi bi-gear-wide-connected" style="color: blue"></i> Test Setup</h3>
    <button class="btn btn-primary" id="addNewGroupBtn"><i class="bi bi-plus-circle"></i> New group</button>
</div>
<div class="card">
    <div class="card-header">
        <strong>Test Group List</strong>
        <span class="badge bg-secondary" id="groupCount">0</span>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="width: 60px">No.</th>
                        <th>Client</th>
                        <th>Server</th>
                        <th>Switch</th>
                        <th>Ethernet Cable</th>
                        <th>Config</th>
                        <th style="width: 100px">Status</th>
                        <th style="width: 280px">Action</th>
                    </tr>
                </thead>
                <tbody id="testGroupBody">
                    <tr id="emptyRow">
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
{% endblock %}
